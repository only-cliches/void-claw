# harness-rules.toml — policy for what the AI agent can do in this project.
# Commit this file to your repository. harness-hat reads it but never pushes
# changes back during workspace sync.
#
# Agents/LLMs are not permitted to edit this file directly. Harness Hat monitors
# this policy file and will notify the user if an agent attempts to modify it.
#
# Preferred place for *human/LLM instructions*:
# llm_instructions = """
# """
#
# ── Hostdo (host-side command execution) ─────────────────────────────────────
#
# default_policy: what happens when a command doesn't match any rule below.
#   auto   — run without prompting (use with caution)
#   prompt — ask the developer in the TUI (default)
#   deny   — reject silently
#
# Passthrough command (exact argv match, auto-approved):
#   [[hostdo.commands]]
#   argv = ["cargo", "test"] # run inside container with `hostdo cargo test`
#   cwd = "$WORKSPACE"         # execution cwd only, not part of approval matching
#   timeout_secs = 60
#   approval_mode = "auto"
#
# Short-lived Docker runner (exact argv + image match, auto-approved):
#   [[hostdo.commands]]
#   argv = ["npm", "test"]     # run with `hostdo --image node:20 npm test`
#   image = "node:20"
#   cwd = "$WORKSPACE"
#   timeout_secs = 60
#   approval_mode = "auto"
#
# Command alias (agent sends `hostdo tests`, expands server-side):
#   [hostdo.command_aliases]
#   tests = "cargo test" # run inside container with `hostdo test`
#   build = { cmd = "cargo build --release", cwd = "$WORKSPACE" }
#
# $WORKSPACE = workspace path on the host.

# ── Network (HTTP/HTTPS proxy policy) ────────────────────────────────────────
#
# Coder-style network rules. Deny matches win over allow matches; if no rule
# matches, request is prompted.
# Rule format:
#   method=GET,POST domain=api.example.com path=/v1/*,/health
#
# Use [network].allowlist for permanent allows and [network].denylist for
# permanent denies.
#
# Domain matching:
# - `domain=example.com` exact only
# - `domain=*.example.com` subdomains only (not the apex)
#
# Path matching:
# - exact (`/v1/users`)
# - wildcard (`/v1/*`)

[hostdo]
default_policy = "prompt"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "check",
    "--all-targets",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "clippy",
    "--all-targets",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "check",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "fmt",
    "--check",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
    "workspace_rules",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
]
image = "rust"
cwd = "$WORKSPACE"
timeout_secs = 120
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "fmt",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "rg",
    "-n",
    "struct Processor",
    "/Users/scottlott/.cargo/registry/src/index.crates.io-1949cf8c6b5b557f/alacritty_terminal-0.26.0/src",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "rg",
    "-n",
    "Processor::new",
    "/Users/scottlott/.cargo/registry/src/index.crates.io-1949cf8c6b5b557f/alacritty_terminal-0.26.0/src",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "deny"

[hostdo.command_aliases.check]
cmd = "cargo check"
cwd = "$WORKSPACE"

[hostdo.command_aliases.fmt]
cmd = "cargo fmt"
cwd = "$WORKSPACE"

[hostdo.command_aliases.build]
cmd = "cargo build"
cwd = "$WORKSPACE"

[hostdo.command_aliases.test]
cmd = "cargo test"
cwd = "$WORKSPACE"

[hostdo.command_aliases.lint]
cmd = "cargo clippy"
cwd = "$WORKSPACE"

[network]
allowlist = [
    "domain=raw.githubusercontent.com",
    "domain=github.com",
    "domain=registry.npmjs.org",
    "domain=api.github.com",
]
denylist = [
    "domain=*.example.com",
]
