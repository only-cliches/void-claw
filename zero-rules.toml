# zero-rules.toml — policy for what the AI agent can do in this project.
# Commit this file to your repository. agent-zero reads it but never pushes
# changes back during workspace sync.
#
# Preferred place for *human/LLM instructions*:
# llm_instructions = """
# """
#
# Optional workspace seed exclusions:
# exclude_patterns = ["node_modules", "dist/**"]

# ── Hostdo (host-side command execution) ─────────────────────────────────────
#
# default_policy: what happens when a command doesn't match any rule below.
#   auto   — run without prompting (use with caution)
#   prompt — ask the developer in the TUI (default)
#   deny   — reject silently
#
# Passthrough command (exact argv match, auto-approved):
#   [[hostdo.commands]]
#   argv = ["cargo", "test"] # run inside container with `hostdo cargo test`
#   cwd = "$WORKSPACE"         # execution cwd only, not part of approval matching
#   approval_mode = "auto"
#
# Command alias (agent sends `hostdo tests`, expands server-side):
#   [hostdo.command_aliases]
#   tests = "cargo test" # run inside container with `hostdo test`
#   build = { cmd = "cargo build --release", cwd = "$CANONICAL" }
#
# $WORKSPACE = container mount target, $CANONICAL = host project path.

# ── Network (HTTP/HTTPS proxy policy) ────────────────────────────────────────
#
# default_policy: what happens when a request doesn't match any rule below.
#   auto   — allow without prompting
#   prompt — ask the developer in the TUI (default)
#   deny   — block silently

exclude_patterns = []

[hostdo]
default_policy = "prompt"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
]
cwd = "$CANONICAL"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "build",
]
cwd = "$CANONICAL"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "fmt",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
    "--lib",
    "container::tests",
]
cwd = "$CANONICAL"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "rg",
    "-n",
    "pub enum NamedColor",
    "/home/ubuntu/.cargo/registry/src",
    "-S",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "deny"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
    "-q",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "check",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "clippy",
    "--",
    "-D",
    "warnings",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
    "config::tests",
    "sync::tests",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
    "config::tests::load_fails_when_direct_mode_has_explicit_workspace_path",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

[[hostdo.commands]]
argv = [
    "cargo",
    "test",
    "--no-run",
]
cwd = "$WORKSPACE"
timeout_secs = 60
concurrency = "queue"
approval_mode = "auto"

